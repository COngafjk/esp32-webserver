<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f7f6;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

/* Gauge */
.gauge {
    width: 200px;
    height: 100px;
    border-top-left-radius: 200px;
    border-top-right-radius: 200px;
    background: #ddd;
    position: relative;
    overflow: hidden;
}

.gauge-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, green, yellow, red);
    transform-origin: center bottom;
    transform: rotate(0deg);
    position: absolute;
    bottom: 0;
}

.gauge-cover {
    width: 150px;
    height: 75px;
    background: white;
    border-top-left-radius: 150px;
    border-top-right-radius: 150px;
    position: absolute;
    bottom: 0;
    left: 25px;
    text-align: center;
    line-height: 80px;
    font-size: 24px;
    font-weight: bold;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

canvas {
    max-width: 600px;
}
</style>
</head>

<body>

<h1>🌡 Dashboard ESP32 + DHT11</h1>

<div class="container">

    <!-- Gauge -->
    <div class="card">
        <h3>Nhiệt độ</h3>
        <div class="gauge">
            <div class="gauge-fill" id="gaugeFill"></div>
            <div class="gauge-cover" id="tempText">--°C</div>
        </div>
    </div>

    <!-- Độ ẩm -->
    <div class="card">
        <h3>Độ ẩm</h3>
        <h1 id="humidity">--%</h1>
    </div>

</div>

<br>

<!-- Chart -->
<div class="card" style="margin:auto;">
    <h3>Biểu đồ realtime</h3>
    <canvas id="chart"></canvas>
</div>

<script>
const API_URL = 'http://localhost:3000/api/data';

// Gauge update
function updateGauge(temp) {
    const angle = (temp / 50) * 180; // max 50°C
    document.getElementById('gaugeFill').style.transform = `rotate(${angle}deg)`;
    document.getElementById('tempText').innerText = temp + '°C';
}

// Chart setup
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: 'Nhiệt độ',
                data: [],
                borderWidth: 2
            },
            {
                label: 'Độ ẩm',
                data: [],
                borderWidth: 2
            }
        ]
    },
    options: {
        responsive: true,
        animation: false,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

// Fetch data
async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const temp = data.temperature;
        const hum = data.humidity;
        const time = new Date().toLocaleTimeString();

        // Update UI
        updateGauge(temp);
        document.getElementById('humidity').innerText = hum + '%';

        // Update chart
        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(temp);
        chart.data.datasets[1].data.push(hum);

        // Giữ tối đa 10 điểm
        if (chart.data.labels.length > 10) {
            chart.data.labels.shift();
            chart.data.datasets.forEach(d => d.data.shift());
        }

        chart.update();

    } catch (err) {
        console.error("Lỗi:", err);
    }
}

// chạy
fetchData();
setInterval(fetchData, 3000);
</script>

</body>
</html>
