<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Giám Sát ESP32</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS: Định dạng giao diện */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Đồng hồ nhiệt độ (Gauge) */
        .gauge { width: 200px; height: 100px; border-radius: 100px 100px 0 0; background: #ddd; position: relative; overflow: hidden; margin: 10px auto; }
        .gauge-fill { width: 100%; height: 100%; background: linear-gradient(to right, #4caf50, #ffeb3b, #f44336); transform-origin: center bottom; transform: rotate(-90deg); position: absolute; bottom: 0; transition: 1s ease-out; }
        .gauge-cover { width: 160px; height: 80px; background: white; border-radius: 80px 80px 0 0; position: absolute; bottom: 0; left: 20px; line-height: 90px; font-size: 28px; font-weight: bold; }
        
        /* Cảnh báo */
        .alert-active { color: #f44336; font-weight: bold; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        input { width: 70px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 8px 20px; background: #1976d2; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>📡 HỆ THỐNG GIÁM SÁT REAL-TIME</h1>

    <div class="container">
        <div class="card">
            <h3>Nhiệt độ môi trường</h3>
            <div class="gauge">
                <div class="gauge-fill" id="gaugeFill"></div>
                <div class="gauge-cover" id="tempValue">--°C</div>
            </div>
            <div id="alertMsg">Trạng thái: Đang kết nối...</div>
        </div>

        <div class="card">
            <h3>Độ ẩm không khí</h3>
            <h1 style="font-size: 48px; color: #0288d1;" id="humValue">--%</h1>
        </div>

        <div class="card">
            <h3>Cài đặt Ngưỡng (°C)</h3>
            <input type="number" id="inputThreshold" value="40">
            <button onclick="updateThreshold()">Cập nhật</button>
            <p id="currentThresholdLabel" style="color: #666; margin-top: 15px;">Ngưỡng hiện tại: --°C</p>
        </div>
    </div>

    <div class="card" style="margin: 20px auto; width: 85%; max-width: 900px;">
        <canvas id="realtimeChart"></canvas>
    </div>

    <script>
        // --- [JS: QUẢN LÝ LOGIC] ---
        const SERVER_IP = window.location.hostname; // Tự động lấy IP máy tính đang chạy server
        const DATA_API = `http://${SERVER_IP}:3000/api/data`;
        const SET_API = `http://${SERVER_IP}:3000/api/threshold`;

        // Khởi tạo biểu đồ
        const ctx = document.getElementById('realtimeChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Nhiệt độ (°C)', data: [], borderColor: '#f44336', tension: 0.3 }, 
                                          { label: 'Độ ẩm (%)', data: [], borderColor: '#2196f3', tension: 0.3 }] }
        });

        // Hàm cập nhật ngưỡng lên Server
        async function updateThreshold() {
            const newVal = document.getElementById('inputThreshold').value;
            try {
                const response = await fetch(SET_API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ threshold: newVal })
                });
                if(response.ok) alert("✅ Đã cập nhật ngưỡng cảnh báo mới!");
            } catch (e) { alert("❌ Lỗi kết nối server!"); }
        }

        // Hàm lấy dữ liệu và cập nhật giao diện
        async function refreshDashboard() {
            try {
                const res = await fetch(DATA_API);
                const data = await res.json();

                // 1. Cập nhật con số & Kim đồng hồ
                document.getElementById('tempValue').innerText = data.temperature + "°C";
                document.getElementById('humValue').innerText = data.humidity + "%";
                document.getElementById('currentThresholdLabel').innerText = `Ngưỡng hiện tại: ${data.alertThreshold}°C`;
                
                const angle = (data.temperature / 50) * 180 - 180; 
                document.getElementById('gaugeFill').style.transform = `rotate(${angle}deg)`;

                // 2. Kiểm tra trạng thái cảnh báo
                const alertUI = document.getElementById('alertMsg');
                if(data.temperature >= data.alertThreshold) {
                    alertUI.innerText = "⚠️ CẢNH BÁO: QUÁ NHIỆT!";
                    alertUI.className = "alert-active";
                } else {
                    alertUI.innerText = "✅ Trạng thái: Bình thường";
                    alertUI.className = "";
                }

                // 3. Cập nhật biểu đồ
                const now = new Date().toLocaleTimeString();
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(data.temperature);
                chart.data.datasets[1].data.push(data.humidity);
                if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets.forEach(d => d.data.shift()); }
                chart.update();

            } catch (err) { console.log("Đợi dữ liệu từ ESP32..."); }
        }

        setInterval(refreshDashboard, 3000); // Cập nhật mỗi 3 giây
    </script>
</body>
</html>
